services:
  dororo-db:
    image: postgres:16
    container_name: dororo-postgres
    environment:
      POSTGRES_USER: bipbop
      POSTGRES_PASSWORD: 67
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - dororo_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bipbop" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dororo-network

  dororo-backend:
    build: .
    container_name: dororo-backend
    depends_on:
      dororo-db:
        condition: service_healthy
    environment:
      - DB_HOST=dororo-db
    ports:
      - "8080:8080"
    networks:
      - dororo-network

  dororo-adminer:
    image: adminer
    container_name: dororo-adminer
    ports:
      - "8081:8080"
    depends_on:
      - dororo-db
    networks:
      - dororo-network

volumes:
  dororo_data:

networks:
  dororo-network:
    driver: bridge
